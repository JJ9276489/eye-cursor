name: Smoke

on:
  push:
  pull_request:

jobs:
  compile:
    name: Compile Python sources
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile tracked sources
        run: python -m compileall -q .
